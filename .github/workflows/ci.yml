name: CI - Validate SQL
on:
  workflow_dispatch:

  push:
    branches: [ dev, main ]
    paths: [ 'objects/**' ]
  pull_request:
    branches: [ main, dev ]
    paths: [ 'objects/**' ]

jobs:
  lint-and-validate:
    runs-on: ubuntu-latest
    env:
      SF_USER: ${{ secrets.SF_USER }}
      SNOWFLAKE_PASSWORD: ${{ secrets.SF_PASSWORD }}
      SF_ROLE: ${{ secrets.SF_ROLE }}
      SF_DATABASE: ${{ secrets.SF_DATABASE }}
      SF_READ_ROLE: ${{ secrets.SF_READ_ROLE }}

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: pip install sqlfluff schemachange

    - name: Fix SQL
      run: sqlfluff fix objects/ --config .sqlfluff --force

    - name: Lint SQL
      run: sqlfluff lint objects/ --config .sqlfluff

    - name: Schemachange Dry-Run
      run: schemachange deploy -f objects --dry-run

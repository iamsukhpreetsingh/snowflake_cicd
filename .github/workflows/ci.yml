name: CI - Validate SQL
on:
  push:
    branches: [ dev, main ]
    paths: [ 'pipelines/**' ]
  pull_request:
    branches: [ main ]
    paths: [ 'pipelines/**' ]

jobs:
  lint-and-validate:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: pip install sqlfluff schemachange

    # Use the pre-processor script instead of raw sqlfluff
    - name: Lint SQL (Dev Context)
      run: python scripts/lint_schemachange.py

    - name: Schemachange Dry-Run
      run: schemachange -f pipelines/ --dry-run
